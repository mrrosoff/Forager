; Standalone test project: official Waveshare epd4in2_V2 demo driver,
; adapted only for Forager's custom SPI pins. Used to isolate whether
; display artifacts are a GxEPD2/Forager code issue or inherent to the
; panel/wiring, by testing against the vendor's own reference driver.
[env:esp32s3_supermini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.mcu = esp32s3

build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
