; Forager — e-ink foraging tamagotchi for ESP32-S3 Super Mini
; PlatformIO project. Open this folder in VSCode with the PlatformIO IDE
; extension installed (see .vscode/extensions.json) and it will configure
; IntelliSense, build, and upload automatically.

[platformio]
default_envs = esp32s3_supermini
src_dir = src

[env:esp32s3_supermini]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32-S3 Super Mini: 8MB flash, no PSRAM on most variants.
board_build.flash_mode = qio
board_build.mcu = esp32s3

build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1   ; Serial over native USB-C
	-D CORE_DEBUG_LEVEL=2
	; Shared headers live in include/ (auto on the path). These add each
	; module dir so a module's own header resolves with plain #include "moon.h".
	-I src/moon
	-I src/net
	-I src/foraging
	-I src/creature
	-I src/display

lib_deps =
	zinggjm/GxEPD2 @ ^1.6.0
	claws/BH1750 @ ^1.3.0
	bblanchon/ArduinoJson @ ^7.0.0
	adafruit/Adafruit GFX Library @ ^1.11.0
	adafruit/Adafruit BusIO @ ^1.16.0
